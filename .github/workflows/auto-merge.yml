name: Auto Merge & Deploy

on:
  # Auto-merge when PR is labeled 'auto-merge'
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  # Also allow manual trigger
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to merge (leave empty to skip)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'auto-merge')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Merge PR (from label trigger)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Auto-merging PR #${{ github.event.pull_request.number }}..."
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch
          echo "✅ PR #${{ github.event.pull_request.number }} merged successfully!"

      - name: Merge PR (from manual trigger)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Auto-merging PR #${{ github.event.inputs.pr_number }}..."
          gh pr merge ${{ github.event.inputs.pr_number }} \
            --squash \
            --auto \
            --delete-branch
          echo "✅ PR #${{ github.event.inputs.pr_number }} merged successfully!"
